kind = "web"
previewPath = "/"
title = "MediaDescribe Pro"
version = "1.0.0"
id = "artifacts/video-accessibility"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20226

[services.development]
run = "pnpm --filter @workspace/video-accessibility run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-accessibility", "run", "build" ]
publicDir = "artifacts/video-accessibility/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20226"
BASE_PATH = "/"
